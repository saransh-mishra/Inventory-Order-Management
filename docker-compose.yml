version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: inventory_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Inventory-Order-Management-Back-End
      dockerfile: Dockerfile
    container_name: inventory_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/inventory
      CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./Inventory-Order-Management-Front-End
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: inventory_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: postgres_data
